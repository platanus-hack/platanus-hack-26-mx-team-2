<article class="live-step {{ s.kind }}">
  <div class="live-step-head">
    <span class="flow-tag">Capa {{ s.stage }}</span>
    <strong class="live-layer">{{ s.layer }}</strong>
    <span class="live-model">{{ s.model }}</span>
    {% if s.trust %}<span class="tt untrusted">{{ s.trust }}</span>{% endif %}
    {% if s.decision %}<span class="badge {{ 'danger' if s.decision == 'BLOCK' else 'ok' }}">{{ s.decision }}</span>{% endif %}
  </div>
  <p class="live-title">{{ s.title }}</p>
  <pre class="live-detail">{{ s.detail }}</pre>
  <p class="live-note">{{ s.note }}</p>
  {% if s.req %}
  <details class="model-logs">
    <summary>Ver request / response crudos del modelo</summary>
    <div class="log-block"><span class="log-label">REQUEST →</span><pre>{{ s.req }}</pre></div>
    <div class="log-block"><span class="log-label">← RESPONSE</span><pre>{{ s.resp }}</pre></div>
  </details>
  {% endif %}
</article>
