server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # Backend (same compose network). Server owns /api, /mcp, /oauth, /health.
  location /api/   { proxy_pass http://server:8787; }
  location /oauth/ { proxy_pass http://server:8787; }
  location /health { proxy_pass http://server:8787; }
  location /mcp {
    proxy_pass http://server:8787;
    proxy_buffering off;          # MCP Streamable HTTP may stream server→client
    proxy_read_timeout 3600s;
  }

  # SPA fallback.
  location / { try_files $uri $uri/ /index.html; }
}
